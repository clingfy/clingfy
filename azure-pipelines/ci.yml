# ci.yml
trigger: none
pr:
  # autoCancel: true
  branches:
    include:
      - develop
      - main

pool:
  vmImage: "macOS-latest"

variables:
  - name: APP_ENV
    ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/develop') }}:
      value: "dev"
    ${{ else }}:
      value: "prod"

steps:
  - checkout: self
    persistCredentials: false
    fetchDepth: 0

  - bash: |
      echo "Verifying toolchain versions"
      xcodebuild -version
      swift --version
    displayName: "Verify Xcode and Swift"

  - task: FlutterInstall@0
    displayName: "Install Flutter 3.41.0"
    inputs:
      mode: auto
      channel: stable
      version: custom
      customVersion: "3.41.0"

  - bash: |
      set -euo pipefail
      VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
      APP_VERSION="${VERSION_LINE%%+*}"
      BUILD_NUMBER="$(Build.BuildId)"

      echo "Resolved version: ${APP_VERSION}+${BUILD_NUMBER}"
      echo "##vso[task.setvariable variable=APP_VERSION]${APP_VERSION}"
      echo "##vso[task.setvariable variable=BUILD_NUMBER]${BUILD_NUMBER}"
    displayName: "Resolve app version"

  - bash: |
      set -euo pipefail
      flutter pub get
      flutter analyze
      flutter test
    displayName: "Analyze and test"

  - bash: |
      set -euo pipefail

      flutter config --enable-macos-desktop

      flutter build macos \
        --debug \
        --config-only \
        --flavor "$(APP_ENV)" \
        --build-name "$(APP_VERSION)" \
        --build-number "$(BUILD_NUMBER)" \
        --dart-define=APP_ENV=$(APP_ENV)

      cd macos
      pod install --repo-update
      cd ..

      xcodebuild \
        -workspace macos/Runner.xcworkspace \
        -scheme "$(APP_ENV)" \
        -configuration "Debug-$(APP_ENV)" \
        CODE_SIGNING_ALLOWED=NO \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGN_IDENTITY="" \
        PROVISIONING_PROFILE_SPECIFIER="" \
        DEVELOPMENT_TEAM="" \
        build
    displayName: "Compile macOS app (unsigned validation build)"

  - task: PublishBuildArtifacts@1
    displayName: "Publish CI artifact"
    inputs:
      PathtoPublish: "build/macos"
      ArtifactName: "Clingfy-CI"
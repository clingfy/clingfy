# dev-channel.yml (alpha)
trigger:
  branches:
    include:
      - develop

# beta-channel.yml (mirror)
# trigger:
#   branches:
#     include:
#       - main
pr: none

pool:
  vmImage: "macOS-latest"

variables:
  - group: "Clingfy-Secrets"

  - name: APP_ENV
    value: "dev"

  - name: RELEASE_CHANNEL
    value: "dev"

  - name: PROV_PROFILE_NAME
    value: "Clingfy_Dev_Distribution.mobileprovision"

  - name: APPLE_PROV_PROFILE_SPECIFIER
    value: "Clingfy_Dev_Distribution"

steps:
  - checkout: self
    persistCredentials: true
    fetchDepth: 0

  - bash: |
      echo "Verifying toolchain versions"
      xcodebuild -version
      swift --version
    displayName: "Verify Xcode and Swift"

  - bash: |
      find ops/release -type f -name "*.sh" -exec chmod +x {} +
    displayName: "Make all scripts executable"

  - task: DownloadSecureFile@1
    name: EnvFile
    displayName: "Download .env.dev"
    inputs:
      secureFile: ".env.dev"

  - bash: |
      cp "$(EnvFile.secureFilePath)" "$(System.DefaultWorkingDirectory)/.env.dev"
    displayName: "Stage .env.dev"

  - bash: |
      set -euo pipefail
      source ".env.dev"

      VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
      APP_VERSION="${VERSION_LINE%%+*}"
      BUILD_NUMBER="$(Build.BuildId)"

      echo "##vso[task.setvariable variable=CERT_PASSWORD;issecret=true]${CERT_PASSWORD}"
      echo "##vso[task.setvariable variable=APP_VERSION]${APP_VERSION}"
      echo "##vso[task.setvariable variable=BUILD_NUMBER]${BUILD_NUMBER}"
      echo "Resolved dev version: ${APP_VERSION}+${BUILD_NUMBER}"
    displayName: "Load env + resolve version"

  - task: AzureCLI@2
    displayName: "Step 0: Restore dev release history"
    inputs:
      azureSubscription: "ClingfyAzureConnection"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        ./ops/release/00_restore_history.sh
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_NUMBER_OVERRIDE: $(BUILD_NUMBER)

  - task: AzureCLI@2
    displayName: "Step 0.5: Release Version Exists Guard"
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_NUMBER_OVERRIDE: $(BUILD_NUMBER)
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
    inputs:
      azureSubscription: "ClingfyAzureConnection"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        source ./ops/release/_config.sh

        EXPECTED_BLOB="${AZ_BINARIES_FOLDER}/${FINAL_DMG_NAME}"
        echo "Checking Azure blob: ${EXPECTED_BLOB}"

        EXISTS="$(
          az storage blob exists \
            --account-name "$AZ_STORAGE_ACCOUNT" \
            --container-name "$AZ_CONTAINER" \
            --name "$EXPECTED_BLOB" \
            --auth-mode login \
            --query exists -o tsv | tr '[:upper:]' '[:lower:]' | tr -d '\r\n '
        )"

        if [ "$EXISTS" = "true" ]; then
          echo "##vso[task.logissue type=error]Dev channel version already exists at ${EXPECTED_BLOB}"
          exit 1
        else
          echo "Version does not exist yet. Proceeding."
        fi

  - task: FlutterInstall@0
    displayName: "Install Flutter 3.41.0"
    inputs:
      mode: auto
      channel: stable
      version: custom
      customVersion: "3.41.0"

  - bash: |
      brew install --cask sparkle
    displayName: "Install Sparkle Tools"

  - bash: |
      if command -v create-dmg >/dev/null 2>&1; then
        echo "create-dmg already installed"
      else
        brew install create-dmg
      fi
    displayName: "Install create-dmg"

  - task: InstallAppleCertificate@2
    displayName: "Install Apple Certificate"
    inputs:
      certSecureFile: "Certificates.p12"
      certPwd: "$(CERT_PASSWORD)"
      keychain: temp

  - task: InstallAppleProvisioningProfile@1
    name: InstallProfile
    displayName: "Install Provisioning Profile $(PROV_PROFILE_NAME)"
    inputs:
      provisioningProfileLocation: secureFiles
      provProfileSecureFile: "$(PROV_PROFILE_NAME)"

  - task: DownloadSecureFile@1
    name: AuthKey
    displayName: "Download Notary Key"
    inputs:
      secureFile: "AuthKey_48876M7734.p8"

  - task: DownloadSecureFile@1
    name: SparkleKey
    displayName: "Download Sparkle Key"
    inputs:
      secureFile: "SparkleKey"

  - bash: |
      ./ops/release/01_build.sh
    displayName: "Step 1: Build and Archive"
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_NUMBER_OVERRIDE: $(BUILD_NUMBER)
      APPLE_PROV_PROFILE_UUID: $(InstallProfile.provisioningProfileUuid)
      APPLE_PROV_PROFILE_SPECIFIER: $(InstallProfile.provisioningProfileName)

  - bash: |
      ./ops/release/02_create_dmg.sh
    displayName: "Step 2: Create DMG"
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_NUMBER_OVERRIDE: $(BUILD_NUMBER)

  - bash: |
      ./ops/release/03_notarize.sh
    displayName: "Step 3: Notarize"
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_NUMBER_OVERRIDE: $(BUILD_NUMBER)
      NOTARY_KEY_PATH: $(AuthKey.secureFilePath)

  - bash: |
      ./ops/release/04_finish.sh
    displayName: "Step 4: Staple and Verify"
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_NUMBER_OVERRIDE: $(BUILD_NUMBER)

  - task: AzureCLI@2
    displayName: "Step 5: Publish Dev Release"
    inputs:
      azureSubscription: "ClingfyAzureConnection"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        export SPARKLE_KEY_PATH="$(SparkleKey.secureFilePath)"
        ./ops/release/05_publish_azure.sh
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_NUMBER_OVERRIDE: $(BUILD_NUMBER)

  - task: PublishBuildArtifacts@1
    displayName: "Publish dev artifact"
    inputs:
      PathtoPublish: "dist"
      ArtifactName: "Clingfy-Dev-Release"

  - bash: |
      ./ops/release/notify_telegram.sh success
    displayName: "Notify Telegram (Success)"
    condition: succeeded()
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_BUILDID: $(Build.BuildId)
      BUILD_SOURCEBRANCHNAME: $(Build.SourceBranchName)

  - bash: |
      ./ops/release/notify_telegram.sh failure
    displayName: "Notify Telegram (Failure)"
    condition: failed()
    env:
      APP_ENV: $(APP_ENV)
      RELEASE_CHANNEL: $(RELEASE_CHANNEL)
      BUILD_BUILDID: $(Build.BuildId)
      BUILD_SOURCEBRANCHNAME: $(Build.SourceBranchName)